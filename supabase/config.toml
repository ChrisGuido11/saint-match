# Disable gateway JWT verification for edge functions.
# Each function handles its own auth via supabaseUser.auth.getUser(),
# so the gateway check is redundant.

[functions.saint-match]
verify_jwt = false

[functions.novena-match]
verify_jwt = false

[functions.novena-generate]
verify_jwt = false

[functions.novena-catalog]
verify_jwt = false

[functions.revenuecat-webhook]
verify_jwt = false
